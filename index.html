<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URBEXA</title>
  <style>
    :root{
      --navy:#0B2E67;
      --blue:#1E7DB6;
      --green:#6BC547;
      --text:#12345d;
      --bg:#ffffff;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      text-align:center;
      padding:32px 20px;
    }

    .wrap{
      max-width:760px;
      width:100%;
    }

    .logo{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:34px;
    }

    .logo-icon{
      width:84px;
      height:84px;
      border-radius:24px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wordmark-main{
      font-size:36px;
      font-weight:900;
      letter-spacing:.08em;
      line-height:1;
    }

    .wordmark-main .n{color:var(--navy)}
    .wordmark-main .x{color:var(--green)}

    .text{
      font-size:32px;
      line-height:1.45;
      font-weight:500;
      color:var(--text);
    }

    @media (max-width:640px){
      .logo{gap:12px;margin-bottom:26px}
      .logo-icon{width:72px;height:72px}
      .wordmark-main{font-size:28px}
      .text{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 120 120" width="64" height="64" aria-label="Logo Urbexa">
          <defs>
            <linearGradient id="urbexaRoof" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0B2E67"></stop>
              <stop offset="55%" stop-color="#1E7DB6"></stop>
              <stop offset="100%" stop-color="#6BC547"></stop>
            </linearGradient>
            <linearGradient id="urbexaBars" x1="0" y1="1" x2="0" y2="0">
              <stop offset="0%" stop-color="#0B2E67"></stop>
              <stop offset="55%" stop-color="#1E7DB6"></stop>
              <stop offset="100%" stop-color="#6BC547"></stop>
            </linearGradient>
          </defs>
          <path d="M60 10 92 26v38c0 17-13 32-32 38C41 96 28 81 28 64V26L60 10Z" fill="none" stroke="url(#urbexaRoof)" stroke-width="4" stroke-linejoin="round"></path>
          <rect x="38" y="40" width="10" height="22" rx="2" fill="url(#urbexaBars)"></rect>
          <rect x="50" y="32" width="10" height="30" rx="2" fill="url(#urbexaBars)"></rect>
          <rect x="62" y="24" width="10" height="38" rx="2" fill="url(#urbexaBars)"></rect>
          <rect x="74" y="35" width="10" height="27" rx="2" fill="url(#urbexaBars)"></rect>
          <path d="M33 72h54" stroke="#D8ECF6" stroke-width="2.5"></path>
          <path d="M36 78 60 67 84 78" fill="none" stroke="#1E7DB6" stroke-width="2" opacity="0.95"></path>
          <path d="M39 83 60 72 81 83" fill="none" stroke="#3A93C6" stroke-width="2" opacity="0.9"></path>
          <path d="M42 88 60 77 78 88" fill="none" stroke="#6BC547" stroke-width="2" opacity="0.75"></path>
        </svg>
      </div>

      <div class="wordmark-main">
        <span class="n">URBE</span><span class="x">X</span><span class="n">A</span>
      </div>
    </div>

    <div class="text">Éditeur de solutions logicielles d’analyse documentaire</div>
  </div>
</body>
</html>
